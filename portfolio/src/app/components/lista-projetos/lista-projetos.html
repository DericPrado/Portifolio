<section class="portfolio-section">
    <h2>Projetos de Back-end</h2>
    <div class="project-grid">
        <div class="project-card" *ngFor="let project of projects">
            <h3>{{ project.title }}</h3>
            <p><strong>Descrição:</strong> {{ project.description }}</p>
            <p><strong>Impacto:</strong> {{ project.impact }}</p>

            <div class="tech-tags">
                <span class="tag" *ngFor="let tech of project.technologies">{{ tech }}</span>
            </div>

            <a [href]="project.githubUrl" target="_blank" class="btn-github">Ver no GitHub</a>
        </div>
    </div>
</section>
